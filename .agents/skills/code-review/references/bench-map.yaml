# Static path-glob → philosophy-bench map for /code-review in Spellbook.
#
# Selection algorithm (implemented by the marshal):
#   1. Start with `default` (always 3 agents).
#   2. For each rule whose `paths` glob matches ANY changed file, union its
#      `add` agents.
#   3. De-dup. Cap at 5 total; if over, drop agents contributed by the rule
#      with the fewest file matches (critic is never dropped).
#   4. Always include `critic`.
#
# Invariant: bench size is in [3, 5] for every diff. Selection is
# deterministic — same diff → same bench.
#
# Only reference agents that exist under /Users/phaedrus/Development/spellbook/agents/.
# Available: critic, ousterhout, carmack, grug, beck, planner, builder.
# (No a11y-* here: this repo has no UI surface.)

default: [critic, ousterhout, grug]

rules:
  # --- Skills ---------------------------------------------------------------
  # Skill bodies are where judgment lives. Ousterhout catches shallow
  # modules; grug catches over-scaffolded skills.
  - name: skills
    paths:
      - "skills/**/SKILL.md"
      - "skills/**/references/**"
      - ".agents/skills/**/SKILL.md"
      - ".agents/skills/**/references/**"
    add: [ousterhout, grug]

  # /deliver has a strict composition lint — critic plus carmack on
  # shippability matter when composition is in play.
  - name: deliver-composition
    paths:
      - "skills/deliver/**"
      - ".agents/skills/deliver/**"
    add: [carmack, critic]

  # --- Agents ---------------------------------------------------------------
  - name: agents
    paths:
      - "agents/**/*.md"
    add: [ousterhout, grug]

  # --- Dagger / CI ----------------------------------------------------------
  # A Dagger gate is a load-bearing wall. carmack for shippability, beck
  # for test coverage on heal_support and friends.
  - name: dagger-ci
    paths:
      - "ci/src/spellbook_ci/**"
      - "ci/tests/**"
      - "dagger.json"
    add: [carmack, beck]

  # --- Bootstrap / scripts --------------------------------------------------
  # bootstrap.sh is cross-harness install; carmack + grug for directness
  # and anti-scaffolding.
  - name: bootstrap
    paths:
      - "bootstrap.sh"
    add: [carmack, grug]

  - name: shell-scripts
    paths:
      - "scripts/**/*.sh"
      - "**/*.sh"
    add: [carmack]

  - name: python-scripts
    paths:
      - "scripts/**/*.py"
    add: [ousterhout, beck]

  # --- Harness configs ------------------------------------------------------
  # harnesses/shared/AGENTS.md is THE principles file (symlinked to every
  # harness). Changes here ripple everywhere — critic + ousterhout.
  - name: shared-principles
    paths:
      - "harnesses/shared/**"
    add: [ousterhout]

  - name: harness-configs
    paths:
      - "harnesses/claude/**"
      - "harnesses/codex/**"
      - "harnesses/pi/**"
      - "harnesses/factory/**"
      - "harnesses/gemini/**"
    add: [carmack]

  # --- Tests ----------------------------------------------------------------
  - name: tests
    paths:
      - "**/*_test.py"
      - "**/test_*.py"
      - "ci/tests/**"
    add: [beck]

  # --- Docs / backlog (lightweight review) ---------------------------------
  - name: docs-and-backlog
    paths:
      - "**/*.md"
      - "backlog.d/**"
      - "docs/**"
    add: [grug]
