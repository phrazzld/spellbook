# Spellbook repo-local Codex config — emitted by /tailor 2026-05-13.
# Codex discovers skills in `.codex/skills/` via symlink bridges back to
# `.agents/skills/`, the canonical shared root.

[project]
name = "spellbook"
description = "Harness library: skills, agents, configs for Claude Code / Codex / Pi"

[skills]
# Filesystem-level selectivity: every symlink under .codex/skills/ is
# discovered. See bootstrap.sh:271 for what's globally installed;
# this repo's local subset lives in .agents/skills/ via /tailor.
roots = [".codex/skills", ".agents/skills"]

# Command allowlist lives in .claude/settings.local.json (Claude Code's
# permission model). Codex does not honor per-command allowlists in
# config.toml — it uses top-level `approval_policy` + `sandbox_mode`
# (configured globally in ~/.codex/config.toml). The `[permissions]`
# key in Codex's schema is a FilesystemPermissionsToml struct (path
# scopes), not a command array, so emitting one here fails config load.

[git]
base-branch = "master"
topic-prefixes = ["feat/", "fix/", "chore/", "docs/", "refactor/", "backlog/", "doctrine/"]
