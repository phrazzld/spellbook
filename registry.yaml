    skills:
      - agent-browser
      - agent-tools
      - codified-context-architecture
      - context-engineering
      - formal-verify
      - harness-engineering
      - llm-infrastructure
      - llm-semantic-match
      - otp-agent-orchestration
      - ralph-patterns
      - skill-builder
      - skill-creator
  infra:
