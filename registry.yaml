# Spellbook Registry — single source of truth for primitive metadata.
#
# Consumed by: bootstrap.sh, /focus, generate-embeddings.py
# Do NOT duplicate this metadata elsewhere. If you need the global skills
# list, harness paths, or external sources — read this file.

global:
  # Process skills: installed by bootstrap.sh, always available, never project-local.
  # bootstrap.sh has custom installers for focus and research (complex directory
  # structures). All others use the generic install_simple_skill().
  skills:
    custom_install:
      - focus
      - research
    standard:
      - autopilot
      - calibrate
      - context-engineering
      - debug
      - groom
      - harness-engineering
      - moonshot
      - pr
      - reflect
      - settle
      - skill

  # Design philosophy agents: installed by bootstrap.sh, always available.
  agents:
    - beck
    - carmack
    - grug
    - ousterhout

# External skill sources for embeddings indexing and multi-source resolution.
# layout: "flat" = skills/*/SKILL.md, "root" = SKILL.md at repo root,
#          "multi-root" = */SKILL.md (top-level dirs)
sources:
  - repo: phrazzld/spellbook
    default: true
    layout: flat
    skills_path: skills
  - repo: anthropics/skills
    layout: flat
    skills_path: skills
  - repo: openai/skills
    layout: flat
    skills_path: skills/.curated
  - repo: vercel-labs/agent-skills
    layout: flat
    skills_path: skills
  - repo: Leonxlnx/taste-skill
    layout: multi-root
  - repo: garrytan/gstack
    layout: multi-root

# Named skill groups for bulk activation via /focus.
# Resolved from .spellbook.yaml collection references.
collections:
  payments:
    description: Payment processing, billing, and financial integrations
    skills: [stripe, bitcoin, lightning]
  web:
    description: Frontend development, visual QA, and browser testing
    skills:
