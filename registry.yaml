      - visual-qa
      - dogfood
      - ux-polish
      - ui-skills
      - webapp-testing
      - agentic-ui-contract
      - pencil-renderer
      - pencil-to-code
      - visualize
  design:
    description: Design systems, aesthetics, and visual craft
    skills: [design]
  agent:
