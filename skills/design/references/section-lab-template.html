<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{LAB_NAME}} — Design Lab</title>
  <meta name="description" content="{{LAB_PURPOSE}}">

  <!-- Use project fonts (match current brand). -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="{{GOOGLE_FONTS_URL}}" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Optional fixed DNA badge -->
  <div class="dna-badge" aria-label="Design DNA">
    <span class="dna-label">DNA</span>
    <span class="dna-traits">{{DNA}}</span>
  </div>

  <main class="lab">
    <header class="lab-header">
      <p class="lab-kicker">Design Lab {{LAB_NUMBER}}</p>
      <h1 class="lab-title">{{LAB_NAME}}</h1>
      <p class="lab-lead">{{LAB_PURPOSE}}</p>
    </header>

    <!-- Baseline -->
    <section class="variant-section" id="baseline" aria-labelledby="baseline-title">
      <header class="variant-header">
        <span class="variant-number">01</span>
        <h2 class="variant-title" id="baseline-title">Baseline</h2>
        <p class="variant-desc">{{BASELINE_DESC}}</p>
      </header>

      <div class="demo-frame">
        <!-- Put baseline HTML here -->
      </div>
    </section>

    <!-- Variant A -->
    <section class="variant-section" id="variant-a" aria-labelledby="variant-a-title">
      <header class="variant-header">
        <span class="variant-number">02</span>
        <h2 class="variant-title" id="variant-a-title">Variant A</h2>
        <p class="variant-desc">{{VARIANT_A_DESC}}</p>
      </header>

      <div class="demo-frame">
        <!-- Put variant A HTML here -->
      </div>
    </section>

    <!-- Variant B -->
    <section class="variant-section" id="variant-b" aria-labelledby="variant-b-title">
      <header class="variant-header">
        <span class="variant-number">03</span>
        <h2 class="variant-title" id="variant-b-title">Variant B</h2>
        <p class="variant-desc">{{VARIANT_B_DESC}}</p>
      </header>

      <div class="demo-frame">
        <!-- Put variant B HTML here -->
      </div>
    </section>

    <!-- Design System Reference -->
    <section class="ref-section" id="reference" aria-labelledby="ref-title">
      <header class="ref-header">
        <p class="ref-kicker">System</p>
        <h2 class="ref-title" id="ref-title">Design System Reference</h2>
      </header>

      <!-- Include typography, palette, component states -->
      <div class="ref-block">
        <!-- ... -->
      </div>
    </section>

    <!-- Implementation Map -->
    <section class="ref-section" id="implementation" aria-labelledby="impl-title">
      <header class="ref-header">
        <p class="ref-kicker">Ship</p>
        <h2 class="ref-title" id="impl-title">Implementation Map</h2>
      </header>

      <ul class="impl-list">
        <li><code>{{FILE_PATH}}</code> — {{CHANGE_NOTE}}</li>
      </ul>
    </section>
  </main>
</body>
</html>
